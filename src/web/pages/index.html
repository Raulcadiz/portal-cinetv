<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Tv — Acceso</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <header>
    <h1>📺 Cine Tv Portal</h1>
  </header>

  <div class="container" style="max-width:400px;padding-top:40px;">
    <div class="card">
      <h2 style="text-align:center;margin-bottom:20px;">Iniciar sesión</h2>
      <form id="login-form">
        <div class="mt-12">
          <label for="username">Usuario</label>
          <input type="text" id="username" autocomplete="username" placeholder="admin" required />
        </div>
        <div class="mt-12">
          <label for="password">Contraseña</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>
        <p id="login-error" class="text-danger mt-8" style="font-size:.875rem;min-height:1.2em;"></p>
        <button id="submit-btn" type="submit" class="btn btn-primary btn-full mt-8">Entrar</button>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="../js/login.js"></script>
</body>
</html>
